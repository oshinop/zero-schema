name: Reusable Miri

on:
  workflow_call:

permissions:
  contents: read

jobs:
  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - run: rustup toolchain install nightly-2026-07-02 --profile minimal --component miri
      - run: rustc +nightly-2026-07-02 -vV && cargo +nightly-2026-07-02 -V
      - run: cargo +nightly-2026-07-02 miri test --locked --manifest-path tests/miri-harness/Cargo.toml --test miri
  gate:
    if: always()
    needs: [miri]
    runs-on: ubuntu-latest
    steps:
      - name: Require focused Miri
        env:
          RESULT: ${{ needs.miri.result }}
        run: test "$RESULT" = success
